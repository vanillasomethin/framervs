# Static site — no build step. Publish the Framer export in public/ as-is so
# the Framer runtime (and all its animations) runs exactly as designed.
[build]
  publish = "public"

# Apex → www is handled by Netlify's domain management (primary domain +
# alias redirect). A duplicate redirect here can ping-pong against that and
# cause "too many redirects" loops, so it's intentionally left out.

# Serve the admin SPA, same as the rewrites in vercel.json
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
