[build]
  publish = "public"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://app.framerstatic.com https://events.framer.com https://www.googletagmanager.com https://www.gstatic.com; script-src-elem 'self' 'unsafe-inline' https://app.framerstatic.com https://events.framer.com https://www.googletagmanager.com https://www.gstatic.com; connect-src 'self' https://app.framerstatic.com https://framerusercontent.com https://events.framer.com https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://api.github.com; img-src 'self' data: blob: https://framerusercontent.com https://res.cloudinary.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' blob: https://framerusercontent.com https://res.cloudinary.com; worker-src 'self' blob:; upgrade-insecure-requests;"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
  from = "/team"
  to = "/team.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact/index.html"
  status = 200

