# Static site — no build step. Publish the pre-rendered mirror in public/.
# A package.json now exists for the in-progress Next.js/unframer migration
# (see UNFRAMER_SETUP.md); the explicit no-op command and the skip flag stop
# Netlify from auto-detecting Next and building it before it's ready.
[build]
  command = "echo 'Serving prerendered static site; Next.js build not yet enabled.'"
  publish = "public"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Apex → www, same as the host redirect in vercel.json
[[redirects]]
  from = "https://vanillasometh.in/*"
  to = "https://www.vanillasometh.in/:splat"
  status = 301
  force = true

# Serve the admin SPA, same as the rewrites in vercel.json
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
